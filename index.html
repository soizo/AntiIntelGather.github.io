<!DOCTYPE html>
<html lang="zh-Hant">

<head>
	<meta charset="utf-8">
	<title>横書轉直書</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="shortcut icon" href="./assets/ico/favicon.png">
	<style>
		html {
			zoom: 1.25;
		}

		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: "PMingI.UVar", -apple-system, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
			font-size: 14px;
			color: #222;
			background: #fafafa;
			padding: 20px;
		}

		.wrap {
			max-width: 640px;
			margin: 0 auto;
		}

		h1 {
			font-family: "PMingI.UVar", serif;
			font-size: 36px;
			font-weight: 600;
			margin-bottom: 12px;
		}

		textarea,
		input[type="text"] {
			font-family: inherit;
			font-size: 14px;
			border: 1px solid #ccc;
			border-radius: 4px;
			padding: 6px 8px;
			outline: none;
			transition: border-color .15s;
		}

		textarea:focus,
		input[type="text"]:focus {
			border-color: #555;
		}

		.controls input[type="text"] {
			font-family: "Maple Mono NF CN", "Maple Mono NF", monospace;
			width: 36px;
			text-align: center;
			padding: 2px 4px;
			font-size: 13px;
		}

		#userText {
			width: 100%;
			height: 100px;
			resize: vertical;
			margin-bottom: 8px;
		}

		.controls {
			font-family: "Sarasa UI CL", -apple-system, sans-serif;
			display: flex;
			flex-wrap: wrap;
			gap: 6px 16px;
			font-size: 13px;
			margin-bottom: 8px;
		}

		.controls label {
			cursor: pointer;
			white-space: nowrap;
			user-select: none;
		}

		.sep {
			width: 100%;
			height: 0;
			border: none;
			border-top: 1px solid #e0e0e0;
			margin: 2px 0;
		}

		button {
			font-family: "Sarasa UI CL", -apple-system, sans-serif;
			font-size: 14px;
			font-weight: 500;
			padding: 6px 18px;
			border: none;
			border-radius: 4px;
			cursor: pointer;
			background: #333;
			color: #fff;
			transition: background .15s;
		}

		button:hover {
			background: #555;
		}

		button:active {
			background: #111;
		}

		#output {
			width: 100%;
			min-height: 40px;
			resize: none;
			overflow-x: auto;
			overflow-y: hidden;
			white-space: pre;
			text-align: right;
			line-height: 1;
			letter-spacing: 0.3em;
			background: #fff;
			margin-top: 8px;
		}

		.footer {
			margin-top: 12px;
			font-size: 12px;
			color: #999;
			display: flex;
			gap: 12px;
		}

		.footer a {
			color: #999;
			text-decoration: none;
		}

		.footer a:hover {
			color: #555;
		}
	</style>
</head>

<body>
	<div class="wrap">
		<h1>横書轉直書</h1>

		<textarea id="userText" placeholder="輸入文字，每行對應一列"></textarea>

		<div class="controls">
			<label><input type="radio" name="direction" id="toVertical" checked onchange="toggleDirection()">
				横→直</label>
			<label><input type="radio" name="direction" id="toHorizontal" onchange="toggleDirection()"> 直→横</label>
		</div>

		<div class="controls" id="textChoice">
			<label><input type="radio" name="textChoice" id="byChars" checked> 每行 <input type="text" id="lineLength"
					value="20"> 字</label>
			<label><input type="radio" name="textChoice" id="byLines"> 共 <input type="text" id="lines" value="7">
				行</label>
		</div>

		<div class="controls">
			<label><input type="checkbox" id="optFullWidth" checked> 字母數字轉全角</label>
			<label><input type="checkbox" id="optVertPunct" checked> 標點轉直書</label>
			<label><input type="checkbox" id="optZwsp" checked> 行末加零寬空格</label>
			<label><input type="checkbox" id="optLive" checked> 實時更新</label>
		</div>

		<div style="display: flex; gap: 8px;">
			<button type="button" onclick="myFunction()">轉换</button>
			<button type="button" onclick="copyOutput()">複製結果</button>
		</div>

		<textarea id="output" readonly></textarea>

		<div class="footer">
			<a href="https://github.com/soizo/AntiIntelGather.github.io">GitHub</a>
			<a href="https://creativecommons.org/publicdomain/zero/1.0/">CC0 1.0</a>
		</div>
	</div>
	<script src="./assets/js/function.js"></script>
</body>

</html>
